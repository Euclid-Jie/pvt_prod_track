<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>私募产品周报</title>
    <link rel="icon" href="/icon.ico" type="image/x-icon">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<header class="header">
    <div class="header-content">
        <h1><i class="fas fa-chart-line"></i> 私募产品周报 <span class="header-meta" id="headerMeta"></span></h1>
    </div>
    <div class="export-controls">
        <button onclick="exportExcel()" class="btn btn-primary"><i class="fas fa-file-excel"></i> Excel</button>
        <button onclick="refreshData()" class="btn btn-secondary"><i class="fas fa-sync-alt"></i> 刷新</button>
        <button onclick="openSettings()" class="btn btn-secondary"><i class="fas fa-cog"></i> 设置</button>
    </div>
</header>

<div class="app-body">
    <!-- 左侧策略导航 -->
    <nav class="strategy-nav" id="strategyButtons"></nav>

    <!-- 右侧主内容 -->
    <div class="main-content">
        <div class="stats-bar">
            <div class="hstat">
                <div class="hstat-label">产品总数</div>
                <div class="hstat-value" id="totalFunds">—</div>
            </div>
            <div class="hstat">
                <div class="hstat-label">近一周均值</div>
                <div class="hstat-value" id="avg_recent_week">—</div>
            </div>
            <div class="hstat">
                <div class="hstat-label">今年以来均值</div>
                <div class="hstat-value" id="avgYtd">—</div>
            </div>
            <div class="hstat">
                <div class="hstat-label">近一年均值</div>
                <div class="hstat-value" id="avg_recent_year">—</div>
            </div>
        </div>

        <div class="filter-controls">
            <div class="filter-group">
                <label><i class="fas fa-search"></i> 搜索</label>
                <input type="text" id="searchInput" placeholder="产品名称或管理人…" onkeyup="filterTable()">
            </div>
            <div class="filter-group">
                <label>管理人规模</label>
                <select id="scaleSelect" onchange="filterByScale()">
                    <option value="all" selected>全部</option>
                    <option value="large">50亿及以上</option>
                    <option value="small">50亿以下</option>
                </select>
            </div>
            <div class="filter-group">
                <label>排序</label>
                <select id="sortSelect" onchange="sortTable()">
                    <option value="recent_week">近一周 ↓</option>
                    <option value="ytd">今年以来 ↓</option>
                    <option value="recent_year">近一年 ↓</option>
                    <option value="name">产品名称</option>
                    <option value="manager">管理人</option>
                </select>
            </div>
            <div style="font-size:11px; color:var(--muted)">
                更新时间: <span id="updateTime">—</span>
            </div>
        </div>

        <div class="table-wrapper">
            <div class="table-container">
                <table id="fundTable">
                    <thead>
                        <tr>
                            <th>管理人</th>
                            <th>规模</th>
                            <th>产品名称</th>
                            <th>策略类型</th>
                            <th>近一周(%)</th>
                            <th>今年以来(%)</th>
                            <th>近一年(%)</th>
                            <th>近一年夏普</th>
                            <th>近一年最大回撤(%)</th>
                            <th>2025(%)</th>
                            <th>2024(%)</th>
                            <th>2023(%)</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>

        <footer class="footer">
            <span>© Euclid-Jie 2025 私募产品周报</span>
            <span class="copyright">Go + JavaScript</span>
        </footer>
    </div>
</div>

<div id="loading" class="loading">
    <i class="fas fa-spinner fa-spin"></i> 加载数据中…
</div>

<div id="settingsModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:8px;padding:28px 32px;width:420px;max-width:95vw;">
    <h2 style="margin:0 0 20px;font-size:16px;">设置</h2>
    <div style="display:grid;gap:10px;">
      <label style="font-size:13px;color:#555">数据库地址</label>
      <input id="s_host" placeholder="127.0.0.1" style="padding:6px 8px;border:1px solid #ddd;border-radius:4px;font-size:13px;">
      <label style="font-size:13px;color:#555">端口</label>
      <input id="s_port" placeholder="3306" style="padding:6px 8px;border:1px solid #ddd;border-radius:4px;font-size:13px;">
      <label style="font-size:13px;color:#555">用户名</label>
      <input id="s_user" placeholder="dev" style="padding:6px 8px;border:1px solid #ddd;border-radius:4px;font-size:13px;">
      <label style="font-size:13px;color:#555">密码</label>
      <input id="s_pass" type="password" style="padding:6px 8px;border:1px solid #ddd;border-radius:4px;font-size:13px;">
      <label style="font-size:13px;color:#555">最新交易日 (last_day)</label>
      <input id="s_lastday" placeholder="2026-05-22" style="padding:6px 8px;border:1px solid #ddd;border-radius:4px;font-size:13px;">
      <label style="font-size:13px;color:#555">更新节假日文件 (Chinese_special_holiday.txt)</label>
      <input id="s_holiday" type="file" accept=".txt" style="font-size:13px;">
    </div>
    <div id="settingsMsg" style="min-height:20px;font-size:12px;margin-top:10px;color:green;"></div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:16px;">
      <button onclick="closeSettings()" style="padding:6px 16px;border:1px solid #ddd;background:#f5f5f5;border-radius:4px;cursor:pointer;">取消</button>
      <button onclick="saveSettings()" style="padding:6px 16px;background:#4c51bf;color:#fff;border:none;border-radius:4px;cursor:pointer;">保存</button>
    </div>
  </div>
</div>

<script>
    let allFundsData = [];
    let fundsData = [];
    let currentStrategy = 'all';
    let currentScale = 'all';
    let currentSearch = '';

    async function loadIntervals() {
        try {
            const d = await (await fetch('/api/intervals')).json();
            document.getElementById('headerMeta').textContent =
                `近一周 ${d.week_begin} ~ ${d.week_end} · 今年以来 ${d.ytd_begin} ~ ${d.ytd_end}`;
        } catch (e) {}
    }

    async function loadData() {
        showLoading(true);
        try {
            const data = await (await fetch('/api/data')).json();
            allFundsData = data.funds;
            fundsData = [...allFundsData];
            filterAndRender();
            document.getElementById('updateTime').textContent = new Date().toLocaleString('zh-CN');
        } catch (e) {
            alert('加载数据失败，请检查网络连接');
        }
        showLoading(false);
    }

    async function loadStrategies() {
        try {
            const data = await (await fetch('/api/strategies')).json();
            const container = document.getElementById('strategyButtons');
            container.innerHTML = '';

            const allBtn = document.createElement('button');
            allBtn.className = 'strategy-btn active';
            allBtn.innerHTML = '<i class="fas fa-th-large"></i><span>全部</span>';
            allBtn.dataset.strategy = 'all';
            allBtn.onclick = () => filterByStrategy('all');
            container.appendChild(allBtn);

            data.strategies.forEach(s => {
                const btn = document.createElement('button');
                btn.className = 'strategy-btn';
                btn.innerHTML = `<span>${s}</span>`;
                btn.dataset.strategy = s;
                btn.onclick = () => filterByStrategy(s);
                container.appendChild(btn);
            });
        } catch (e) {}
    }

    function filterByStrategy(strategy) {
        currentStrategy = strategy;
        document.querySelectorAll('.strategy-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.strategy === strategy);
        });
        filterAndRender();
    }

    function filterByScale() {
        currentScale = document.getElementById('scaleSelect').value;
        filterAndRender();
    }

    function filterTable() {
        currentSearch = document.getElementById('searchInput').value.toLowerCase();
        filterAndRender();
    }

    function filterAndRender() {
        fundsData = allFundsData.filter(fund => {
            if (currentStrategy !== 'all' && fund.strategy !== currentStrategy) return false;
            if (currentScale === 'large' && fund.scale_level === '小厂') return false;
            if (currentScale === 'small' && fund.scale_level === '大厂') return false;
            if (currentSearch) {
                const m = (fund.manager || '').toLowerCase();
                const p = (fund.product_name || '').toLowerCase();
                if (!m.includes(currentSearch) && !p.includes(currentSearch)) return false;
            }
            return true;
        });
        sortTable();
        updateStats();
    }

    function renderTable(data) {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        const fmt = v => {
            if (v === undefined || v === 'nan' || v === '-') return '-';
            const n = parseFloat(v);
            return isNaN(n) ? v : n.toFixed(2);
        };
        const cls = (v, inv = false) => {
            const n = parseFloat(v);
            if (isNaN(n)) return '';
            if (n > 0) return inv ? 'negative' : 'positive';
            if (n < 0) return inv ? 'positive' : 'negative';
            return '';
        };
        data.forEach(fund => {
            const tr = document.createElement('tr');
            if (fund.manager === '基准') tr.classList.add('benchmark-row');
            tr.innerHTML = `
                <td>${fund.manager || '-'}</td>
                <td class="scale">${fund.scale || '-'}</td>
                <td class="product-name">${fund.product_name || '-'}</td>
                <td>${fund.strategy || '-'}</td>
                <td class="${cls(fund.recent_week)} highlight">${fmt(fund.recent_week)}</td>
                <td class="${cls(fund.ytd)} highlight">${fmt(fund.ytd)}</td>
                <td class="${cls(fund.recent_year)}">${fmt(fund.recent_year)}</td>
                <td class="${cls(fund.recent_year_sharpe)}">${fmt(fund.recent_year_sharpe)}</td>
                <td class="mdd">${fmt(fund.recent_year_mdd)}</td>
                <td class="${cls(fund.y2025)}">${fmt(fund.y2025)}</td>
                <td class="${cls(fund.y2024)}">${fmt(fund.y2024)}</td>
                <td class="${cls(fund.y2023)}">${fmt(fund.y2023)}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    function sortTable() {
        const by = document.getElementById('sortSelect').value;
        const numVal = (f, k) => { const v = parseFloat(f[k]); return isNaN(v) ? null : v; };
        const sorted = [...fundsData].sort((a, b) => {
            switch (by) {
                case 'name':    return (a.product_name || '').localeCompare(b.product_name || '');
                case 'manager': return (a.manager || '').localeCompare(b.manager || '');
                default: {
                    const k = by;
                    const av = numVal(a, k), bv = numVal(b, k);
                    if (av === null && bv === null) return 0;
                    if (av === null) return 1;
                    if (bv === null) return -1;
                    return bv - av;
                }
            }
        });
        renderTable(sorted);
    }

    function updateStats() {
        const d = fundsData.filter(f => f.scale_level !== 'benchmark');
        document.getElementById('totalFunds').textContent = d.length;
        const avg = key => {
            const vals = d.map(f => parseFloat(f[key])).filter(v => !isNaN(v));
            if (!vals.length) return '—';
            return (vals.reduce((a, b) => a + b, 0) / vals.length).toFixed(2) + '%';
        };
        document.getElementById('avg_recent_week').textContent = avg('recent_week');
        document.getElementById('avgYtd').textContent = avg('ytd');
        document.getElementById('avg_recent_year').textContent = avg('recent_year');
    }

    function exportExcel() { window.open('/api/export/excel', '_blank'); }
    function refreshData() { fetch('/api/refresh', {method:'POST'}).then(() => loadData()); }
    function showLoading(s) { document.getElementById('loading').style.display = s ? 'flex' : 'none'; }

    async function openSettings() {
        const d = await (await fetch('/api/config')).json();
        document.getElementById('s_host').value = d.db_host || '';
        document.getElementById('s_port').value = d.db_port || '3306';
        document.getElementById('s_user').value = d.db_user || '';
        document.getElementById('s_pass').value = d.db_pass || '';
        document.getElementById('s_lastday').value = d.last_day || '';
        document.getElementById('settingsMsg').textContent = '';
        document.getElementById('settingsModal').style.display = 'flex';
    }
    function closeSettings() { document.getElementById('settingsModal').style.display = 'none'; }

    async function saveSettings() {
        const msg = document.getElementById('settingsMsg');
        const body = {
            db_host: document.getElementById('s_host').value.trim(),
            db_port: document.getElementById('s_port').value.trim() || '3306',
            db_user: document.getElementById('s_user').value.trim(),
            db_pass: document.getElementById('s_pass').value,
            last_day: document.getElementById('s_lastday').value.trim(),
        };
        const r = await fetch('/api/config', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)});
        if (!r.ok) { msg.style.color='red'; msg.textContent = '保存失败: ' + await r.text(); return; }

        const file = document.getElementById('s_holiday').files[0];
        if (file) {
            const fd = new FormData(); fd.append('file', file);
            const r2 = await fetch('/api/config/holiday', {method:'POST', body: fd});
            if (!r2.ok) { msg.style.color='red'; msg.textContent = '节假日文件上传失败'; return; }
        }

        msg.style.color = 'green'; msg.textContent = '保存成功，数据已刷新';
        loadIntervals(); loadData(); loadStrategies();
        setTimeout(closeSettings, 1000);
    }

    document.addEventListener('DOMContentLoaded', () => {
        loadIntervals();
        loadStrategies();
        fetch('/api/status').then(r => r.json()).then(d => {
            if (!d.configured) { openSettings(); } else { loadData(); }
        });
    });

    document.addEventListener('keydown', e => {
        if (e.ctrlKey && e.key === 's') { e.preventDefault(); exportExcel(); }
        if (e.ctrlKey && e.key === 'f') { e.preventDefault(); document.getElementById('searchInput').focus(); }
    });
</script>
</body>
</html>
