<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>私募产品周报</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<header class="header">
    <div class="header-content">
        <h1><i class="fas fa-chart-line"></i> 私募产品周报 <span class="header-meta">近一周 {{ week_begin }} ~ {{ week_end }} &nbsp;·&nbsp; 今年以来 {{ ytd_begin }} ~ {{ ytd_end }}</span></h1>
    </div>
    <div class="export-controls">
        <button onclick="exportPDF()" class="btn btn-warning"><i class="fas fa-file-pdf"></i> PDF</button>
        <button onclick="exportExcel()" class="btn btn-primary"><i class="fas fa-file-excel"></i> Excel</button>
        <button onclick="refreshData()" class="btn btn-secondary"><i class="fas fa-sync-alt"></i> 刷新</button>
    </div>
</header>

<div class="strategy-bar" id="strategyButtons"></div>

<div class="stats-bar">
    <div class="hstat">
        <div class="hstat-label">产品总数</div>
        <div class="hstat-value" id="totalFunds">—</div>
    </div>
    <div class="hstat">
        <div class="hstat-label">近一周均值</div>
        <div class="hstat-value" id="avg_recent_week">—</div>
    </div>
    <div class="hstat">
        <div class="hstat-label">今年以来均值</div>
        <div class="hstat-value" id="avgYtd">—</div>
    </div>
    <div class="hstat">
        <div class="hstat-label">近一年均值</div>
        <div class="hstat-value" id="avg_recent_year">—</div>
    </div>
</div>

<div class="filter-controls">
    <div class="filter-group">
        <label><i class="fas fa-search"></i> 搜索</label>
        <input type="text" id="searchInput" placeholder="产品名称或管理人…" onkeyup="filterTable()">
    </div>
    <div class="filter-group">
        <label>管理人规模</label>
        <select id="scaleSelect" onchange="filterByScale()">
            <option value="all" selected>全部</option>
            <option value="large">50亿及以上</option>
            <option value="small">50亿以下</option>
        </select>
    </div>
    <div class="filter-group">
        <label>排序</label>
        <select id="sortSelect" onchange="sortTable()">
            <option value="recent_week">近一周 ↓</option>
            <option value="recent_week_asc">近一周 ↑</option>
            <option value="ytd">今年以来 ↓</option>
            <option value="ytd_asc">今年以来 ↑</option>
            <option value="name">产品名称</option>
            <option value="manager">管理人</option>
        </select>
    </div>
    <div style="font-size:11px; color:var(--muted)">
        更新时间: <span id="updateTime">—</span>
    </div>
</div>

<div class="table-wrapper">
    <div class="table-container">
        <table id="fundTable">
            <thead>
                <tr>
                    <th>管理人</th>
                    <th>规模</th>
                    <th>产品名称</th>
                    <th>净值起始日</th>
                    <th>近一周(%)</th>
                    <th>今年以来(%)</th>
                    <th>近一年(%)</th>
                    <th>近一年夏普</th>
                    <th>近一年最大回撤(%)</th>
                    <th>2025(%)</th>
                    <th>2024(%)</th>
                    <th>2023(%)</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<div id="loading" class="loading">
    <i class="fas fa-spinner fa-spin"></i> 加载数据中…
</div>

<footer class="footer">
    <span>© Euclid-Jie 2025 私募产品周报</span>
    <span class="copyright">Python Flask + JavaScript</span>
</footer>

<script>
    let allFundsData = [];
    let fundsData = [];
    let currentStrategy = 'all';
    let currentScale = 'all';
    let currentSearch = '';

    async function loadData() {
        showLoading(true);
        try {
            const response = await fetch('/api/data');
            const data = await response.json();
            allFundsData = data.funds;
            fundsData = [...allFundsData];
            filterAndRender();
            document.getElementById('updateTime').textContent = new Date().toLocaleString('zh-CN');
        } catch (e) {
            alert('加载数据失败，请检查网络连接');
        }
        showLoading(false);
    }

    async function loadStrategies() {
        try {
            const data = await (await fetch('/api/strategies')).json();
            const container = document.getElementById('strategyButtons');
            container.innerHTML = '';

            const allBtn = document.createElement('button');
            allBtn.className = 'strategy-btn active';
            allBtn.textContent = '全部';
            allBtn.dataset.strategy = 'all';
            allBtn.onclick = () => filterByStrategy('all');
            container.appendChild(allBtn);

            data.strategies.forEach(s => {
                const btn = document.createElement('button');
                btn.className = 'strategy-btn';
                btn.textContent = s;
                btn.dataset.strategy = s;
                btn.onclick = () => filterByStrategy(s);
                container.appendChild(btn);
            });
        } catch (e) {}
    }

    function filterByStrategy(strategy) {
        currentStrategy = strategy;
        document.querySelectorAll('.strategy-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.strategy === strategy);
        });
        filterAndRender();
    }

    function filterByScale() {
        currentScale = document.getElementById('scaleSelect').value;
        filterAndRender();
    }

    function filterTable() {
        currentSearch = document.getElementById('searchInput').value.toLowerCase();
        filterAndRender();
    }

    function filterAndRender() {
        fundsData = allFundsData.filter(fund => {
            if (currentStrategy !== 'all' && fund.strategy !== currentStrategy) return false;
            if (currentScale === 'large' && fund.scale_level === '小厂') return false;
            if (currentScale === 'small' && fund.scale_level === '大厂') return false;
            if (currentSearch) {
                const m = (fund.manager || '').toLowerCase();
                const p = (fund.product_name || '').toLowerCase();
                if (!m.includes(currentSearch) && !p.includes(currentSearch)) return false;
            }
            return true;
        });
        sortTable();
        updateStats();
    }

    function renderTable(data) {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        const fmt = v => {
            if (v === undefined || v === 'nan' || v === '-') return '-';
            const n = parseFloat(v);
            return isNaN(n) ? v : n.toFixed(2);
        };
        const cls = (v, inv = false) => {
            const n = parseFloat(v);
            if (isNaN(n)) return '';
            if (n > 0) return inv ? 'negative' : 'positive';
            if (n < 0) return inv ? 'positive' : 'negative';
            return '';
        };
        data.forEach(fund => {
            const tr = document.createElement('tr');
            if (fund.manager === '基准') tr.classList.add('benchmark-row');
            tr.innerHTML = `
                <td>${fund.manager || '-'}</td>
                <td class="scale">${fund.scale || '-'}</td>
                <td class="product-name">${fund.product_name || '-'}</td>
                <td>${fund.start_date || '-'}</td>
                <td class="${cls(fund.recent_week)} highlight">${fmt(fund.recent_week)}</td>
                <td class="${cls(fund.ytd)} highlight">${fmt(fund.ytd)}</td>
                <td class="${cls(fund.recent_year)}">${fmt(fund.recent_year)}</td>
                <td class="${cls(fund.recent_year_sharpe)}">${fmt(fund.recent_year_sharpe)}</td>
                <td class="mdd">${fmt(fund.recent_year_mdd)}</td>
                <td class="${cls(fund.y2025)}">${fmt(fund.y2025)}</td>
                <td class="${cls(fund.y2024)}">${fmt(fund.y2024)}</td>
                <td class="${cls(fund.y2023)}">${fmt(fund.y2023)}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    function sortTable() {
        const by = document.getElementById('sortSelect').value;
        const sorted = [...fundsData].sort((a, b) => {
            switch (by) {
                case 'name':    return (a.product_name || '').localeCompare(b.product_name || '');
                case 'manager': return (a.manager || '').localeCompare(b.manager || '');
                case 'recent_week':     return (parseFloat(b.recent_week) || 0) - (parseFloat(a.recent_week) || 0);
                case 'recent_week_asc': return (parseFloat(a.recent_week) || 0) - (parseFloat(b.recent_week) || 0);
                case 'ytd':     return (parseFloat(b.ytd) || 0) - (parseFloat(a.ytd) || 0);
                case 'ytd_asc': return (parseFloat(a.ytd) || 0) - (parseFloat(b.ytd) || 0);
                default: return 0;
            }
        });
        renderTable(sorted);
    }

    function updateStats() {
        const d = fundsData.filter(f => f.scale_level !== 'benchmark');
        document.getElementById('totalFunds').textContent = d.length;
        const avg = (key) => {
            const vals = d.map(f => parseFloat(f[key])).filter(v => !isNaN(v));
            if (!vals.length) return '—';
            return (vals.reduce((a, b) => a + b, 0) / vals.length).toFixed(2) + '%';
        };
        document.getElementById('avg_recent_week').textContent = avg('recent_week');
        document.getElementById('avgYtd').textContent = avg('ytd');
        document.getElementById('avg_recent_year').textContent = avg('recent_year');
    }

    function exportPDF()   { window.open('/api/export/pdf', '_blank'); }
    function exportExcel() { window.open('/api/export/excel', '_blank'); }
    function refreshData() { fetch('/api/refresh', {method:'POST'}).then(() => loadData()); }
    function showLoading(s) { document.getElementById('loading').style.display = s ? 'flex' : 'none'; }

    document.addEventListener('DOMContentLoaded', () => { loadData(); loadStrategies(); });

    document.addEventListener('keydown', e => {
        if (e.ctrlKey && e.key === 'p') { e.preventDefault(); exportPDF(); }
        if (e.ctrlKey && e.key === 's') { e.preventDefault(); exportExcel(); }
        if (e.ctrlKey && e.key === 'f') { e.preventDefault(); document.getElementById('searchInput').focus(); }
    });
</script>
</body>
</html>
